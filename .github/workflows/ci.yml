name: C++20 Micro-DNS CI

# Trigger this workflow on every push to the main branch
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install modern compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13 cmake

      - name: Configure CMake (Enable TSAN)
        run: cmake -B build -S . -DCMAKE_CXX_COMPILER=g++-13

      - name: Build project
        run: cmake --build build --parallel 4

      - name: Run Tests
        run: cd build && ctest --output-on-failure
